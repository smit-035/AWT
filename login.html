<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel PMS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Background */
body {
    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("https://images.unsplash.com/photo-1566073771259-6a8506099945");
    background-size: cover;
    background-position: center;
}

/* Login container */
.container {
    width: 920px;
    height: 540px;
    display: flex;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    margin: 80px auto;
}

/* Left panel */
.left {
    flex: 1;
    background: linear-gradient(140deg, #f97316, #fb7185, #6366f1);
    color: white;
    padding: 60px 45px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 25px;
    border: 3px solid white;
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.left h1 {
    font-size: 36px;
    margin-bottom: 8px;
}

.tagline {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 20px;
}

.left p {
    font-size: 13px;
    line-height: 1.6;
}

/* Right panel */
.right {
    flex: 1;
    background: white;
    padding: 50px 45px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right h2 {
    margin-bottom: 25px;
    color: #111827;
}

.input-group {
    margin-bottom: 18px;
}

.input-group label {
    font-size: 13px;
    color: #374151;
}

.input-group input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
}

.login-btn {
    margin-top: 10px;
    padding: 12px;
    background: linear-gradient(120deg, #6366f1, #fb7185);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.help-btn {
    margin-top: 12px;
    padding: 11px;
    background: transparent;
    border: 1px solid #6366f1;
    color: #6366f1;
    border-radius: 8px;
    cursor: pointer;
}

.footer {
    margin-top: 18px;
    font-size: 12px;
    color: #6b7280;
    text-align: center;
}

/* Founders section */
.founders {
    padding: 60px 20px;
    text-align: center;
    background: #f9fafb;
}

.founders h2 {
    font-size: 28px;
    margin-bottom: 40px;
    color: #111827;
}

.founder-cards {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 220px;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 12px;
}

.card h3 {
    font-size: 18px;
    margin-bottom: 4px;
}

.card p {
    font-size: 13px;
    color: #6b7280;
}
</style>
</head>

<body>

<!-- Login Section -->
<div class="container">

    <div class="left">
        <div class="logo">
            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267" alt="Hotel Logo">
        </div>

        <h1>Hotel Manager</h1>
        <div class="tagline">Making daily hotel work easier.</div>

        <p>
            A simple system to manage bookings, rooms and guests without
            the stress. Designed for people, not just computers.
        </p>
    </div>

    <div class="right">
        <h2>Sign In</h2>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="login-btn" onclick="login()">Login</button>
        <button class="help-btn">Help & Support</button>

        <p id="error" style="color:red; font-size:13px; margin-top:10px;"></p>

        <div class="footer">
            © 2026 Hotel PMS — Built for real people
        </div>
    </div>

</div>

<!-- Founders Section -->
<section class="founders">
    <h2>Founders</h2>

    <div class="founder-cards">
        <div class="card">
            <img src="logo.jpg" alt="Smit Makavana">
            <h3>Smit Makavana</h3>
            <p>Founder</p>
        </div>

        <div class="card">
            <img src="logo2.jpg" alt="Dhruv Chittora">
            <h3>Dhruv Chittora</h3>
            <p>Founder</p>
        </div>
    </div>
</section>

<script>
async function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  function logout() {
    localStorage.removeItem("loggedIn"); // remove session
    window.location.href = "login.html"; // go to login page
}

  const res = await fetch("http://localhost:5000/api/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: user,
      password: pass
    })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("loggedIn", "true");

    window.location.href = "dashboard.html"; // ✅ ONLY THIS
} else {
    document.getElementById("error").innerText = "Invalid login";
  }

}
</script>

</body>
</html>
