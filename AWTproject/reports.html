<!DOCTYPE html>
<html>
<head>
<title>Reports - Hotel PMS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1566073771259-6a8506099945");
background-size:cover;background-position:center;
min-height:100vh;padding:40px;
}

.container{
width:1100px;margin:auto;background:white;border-radius:18px;
overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

.navbar{
background:linear-gradient(140deg,#f97316,#fb7185,#6366f1);
color:white;padding:18px 25px;
display:flex;align-items:center;gap:25px;
}

.navbar img{
width:40px;height:40px;border-radius:50%;
object-fit:cover;border:2px solid white;
}

.navbar h2{margin-right:auto;font-size:18px;}
.navbar a{color:white;text-decoration:none;font-size:14px;}
.navbar a:hover{text-decoration:underline;}

.content{padding:30px;}

h1{text-align:center;margin-bottom:20px;}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#6366f1;
color:white;
}

.report-box{
background:#f9fafb;
padding:20px;
border-radius:12px;
margin-top:20px;
line-height:1.8;
}

/* Charts Layout */
.charts{
display:flex;
gap:20px;
margin-top:30px;
justify-content:space-between;
}

.chart-card{
width:48%;
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
height:260px;
}

.chart-card canvas{
width:100% !important;
height:100% !important;
}
</style>
</head>

<body>

<div class="container">

<div class="navbar">
<img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267">
<h2>Hotel PMS</h2>

<a href="dashboard.html">Dashboard</a>
<a href="rooms.html">Rooms</a>
<a href="booking.html">Booking</a>
<a href="checkout.html">Checkout</a>
<a href="reports.html">Reports</a>
</div>

<div class="content">

<h1>Reports & Analytics</h1>

<button onclick="daily()">Daily Occupancy</button>
<button onclick="revenue()">Revenue Report</button>
<button onclick="historyReport()">Guest History</button>

<div class="report-box" id="reportBox">
Select a report
</div>

<!-- Charts -->
<div class="charts">
<div class="chart-card">
<canvas id="occupancyChart"></canvas>
</div>

<div class="chart-card">
<canvas id="revenueChart"></canvas>
</div>
</div>

</div>
</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

const ratePerNight = 2000;

/* ---------- Text Reports ---------- */

function daily(){
let total=rooms.length;
let occupied=rooms.filter(r=>r.status==="Occupied").length;
let available=total-occupied;
let percent=Math.round((occupied/total)*100);

document.getElementById("reportBox").innerHTML=`
Total Rooms: ${total}<br>
Occupied: ${occupied}<br>
Available: ${available}<br>
Occupancy Rate: ${percent}%
`;
}

function revenue(){
let total=0;

history.forEach(h=>{
let stay=(new Date(h.checkout)-new Date(h.checkin))/(1000*60*60*24);
stay=Math.max(1,stay);
total+=stay*ratePerNight;
});

document.getElementById("reportBox").innerHTML=
`Total Revenue (completed stays): ₹${total}`;
}

function historyReport(){
if(history.length===0){
document.getElementById("reportBox").innerHTML="No history yet";
return;
}

let html="<b>Guest History</b><br><br>";

history.forEach(h=>{
html+=`${h.guest} | Room ${h.room} | ${h.checkin} → ${h.checkout}<br>`;
});

document.getElementById("reportBox").innerHTML=html;
}

/* ---------- Charts ---------- */

// Occupancy chart
let occupied = rooms.filter(r=>r.status==="Occupied").length;
let available = rooms.length - occupied;

new Chart(document.getElementById("occupancyChart"),{
type:"doughnut",
data:{
labels:["Occupied","Available"],
datasets:[{
data:[occupied,available],
backgroundColor:["#fb7185","#22c55e"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{title:{display:true,text:"Room Occupancy"}}
}
});

// Revenue chart
let revenueData=[];
let labels=[];

history.forEach((h,i)=>{
let stay=(new Date(h.checkout)-new Date(h.checkin))/(1000*60*60*24);
stay=Math.max(1,stay);
revenueData.push(stay*ratePerNight);
labels.push("Booking "+(i+1));
});

new Chart(document.getElementById("revenueChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Revenue ₹",
data:revenueData,
backgroundColor:"#6366f1"
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{title:{display:true,text:"Revenue Per Booking"}},
scales:{y:{beginAtZero:true}}
}
});

</script>

</body>
</html>
