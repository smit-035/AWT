<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Manager</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>📇 Contact Manager</h1>

        <!-- Add / Edit Form -->
        <div class="form-card">
            <h2 id="form-title">Add New Contact</h2>
            <input type="hidden" id="edit-id" />
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" required />
            </div>
            <div class="form-group">
                <input type="text" id="phone" placeholder="Phone Number" required />
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required />
            </div>
            <div class="form-actions">
                <button id="save-btn" onclick="saveContact()">Save Contact</button>
                <button id="cancel-btn" class="btn-secondary" onclick="cancelEdit()" style="display:none;">Cancel</button>
            </div>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <input type="text" id="search" placeholder="🔍 Search contacts by name..." oninput="searchContacts()" />
        </div>

        <!-- Contact List -->
        <div id="contact-list" class="contact-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
