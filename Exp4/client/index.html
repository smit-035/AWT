<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <section id="screen-login" class="auth-card">
      <div class="card-header">
        <h1>Welcome Back</h1>
        <p>Please enter your credentials to continue</p>
      </div>
      <form id="login-form" class="standard-form">
        <input name="username" type="text" placeholder="Username" required />
        <input name="password" type="password" placeholder="Password" required />
        <select name="role" required>
          <option value="user">Login as User</option>
          <option value="admin">Login as Admin</option>
        </select>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
      <p id="login-message" class="err-msg"></p>
    </section>

    <section id="screen-user-details" class="auth-card hidden">
      <div class="card-header">
        <h1>Almost There</h1>
        <p>Hello <span id="details-username" class="highlight"></span>, tell us about yourself</p>
      </div>
      <form id="details-form" class="standard-form">
        <input name="name" type="text" placeholder="Full Name" required />
        <input name="location" type="text" placeholder="Your City" required />
        <button type="submit" class="btn-primary">Save & Continue</button>
      </form>
      <p id="details-message" class="err-msg"></p>
    </section>

    <section id="screen-user-dashboard" class="dashboard-card hidden">
      <div class="dash-header">
        <h2>User Profile</h2>
        <button id="logout-user" class="btn-outline">Logout</button>
      </div>
      <div class="profile-stats">
        <div class="stat-item"><span>User:</span> <strong id="dash-username"></strong></div>
        <div class="stat-item"><span>Name:</span> <strong id="dash-name"></strong></div>
        <div class="stat-item"><span>City:</span> <strong id="dash-location"></strong></div>
        <div class="stat-item"><span>Last Seen:</span> <strong id="dash-login-time"></strong></div>
      </div>
    </section>

    <section id="screen-admin-dashboard" class="admin-card hidden">
      <div class="dash-header">
        <h2>Admin Console</h2>
        <button id="logout-admin" class="btn-outline">Logout</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Full Name</th>
              <th>Location</th>
              <th>Login Time</th>
            </tr>
          </thead>
          <tbody id="admin-users-body"></tbody>
        </table>
      </div>
      <p id="admin-message" class="err-msg"></p>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
