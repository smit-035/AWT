<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { display: block; text-align: center; background: #6c757d; color: white; padding: 10px; text-decoration: none; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Edit Profile</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <a href="/logout" class="btn">Update & Logout</a>
    </div>
</body>
</html>
