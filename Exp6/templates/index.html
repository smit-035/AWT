<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>My Tasks</h1>

        <form action="{{ url_for('add_task') }}" method="POST" class="todo-form">
            <input type="text" name="task" placeholder="Enter a new task..." required>
            <button type="submit">Add Task</button>
        </form>

        <hr>

        <ul class="task-list">
            {% if tasks %}
                {% for task in tasks %}
                    <li>
                        <span>{{ task }}</span>
                        <form action="{{ url_for('delete_task', task_id=loop.index0) }}" method="POST" style="display:inline;">
                            <button type="submit" class="delete-btn">x</button>
                        </form>
                    </li>
                {% endfor %}
            {% else %}
                <p class="muted">No tasks yet. Add one above!</p>
            {% endif %}
        </ul>
    </div>
</body>
</html>
